---
- name: Cleanup Fabric Network
  hosts: fabric_nodes
  gather_facts: no
  vars:
    remote_resources_dir: /root/fabric_resources
  tasks:
    - name: Kill all containers
      shell: "timeout 30 docker ps -q | xargs -r docker kill"
      ignore_errors: yes

    - name: Remove all containers
      shell: "timeout 30 docker ps -aq | xargs -r docker rm"
      ignore_errors: yes

    - name: Prune Docker system
      shell: "timeout 30 docker network prune -f && timeout 30 docker volume prune -f"
      ignore_errors: yes

    - name: Purge remote caches (if requested)
      file:
        path: "{{ remote_resources_dir }}/crypto-config"
        state: absent
      when: purge_cache | default(false) | bool

    - name: Purge channel-artifacts cache (if requested)
      file:
        path: "{{ remote_resources_dir }}/channel-artifacts"
        state: absent
      when: purge_cache | default(false) | bool
