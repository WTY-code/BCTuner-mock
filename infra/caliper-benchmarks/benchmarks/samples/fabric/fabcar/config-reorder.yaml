test:
  workers:
    number: 1  # Use 1 worker for precise control
  rounds:
    - label: Create initial cars for conflict testing
      txNumber: 100  # Create 100 cars first
      rateControl:
          type: fixed-rate
          opts:
            tps: 50
      workload:
        module: benchmarks/samples/fabric/fabcar/createCar.js
    
    - label: Execute change car owner transactions
      txNumber: 200  # Exactly 100 transactions
      rateControl:
          type: fixed-rate
          opts:
            tps: 50
      workload:
        module: benchmarks/samples/fabric/fabcar/conflictTransactionGenerator.js
        arguments:
          paramFile: 'reorderTX.txt'  # Path to parameter file
    
    - label: Verify final state
      txDuration: 10
      rateControl:
          type: fixed-rate
          opts:
            tps: 2
      workload:
        module: benchmarks/samples/fabric/fabcar/queryAllCars.js
        arguments:
          startKey: '1'
          endKey: '100'