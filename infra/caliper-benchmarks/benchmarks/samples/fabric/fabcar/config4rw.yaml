test:
  # before:
  #   - type: wait
  #   ms: 5000
  workers:
    number: 1
  rounds:
    - label: Create a car.
      # 5000 transactions should create around 1000 cars per worker but not guaranteed
      # so need to set asset limits to less than 1000 for the other tests
      txNumber: 200
      rateControl:
          type: fixed-rate
          opts:
            tps: 100
      workload:
        module: benchmarks/samples/fabric/fabcar/createCar4rw.js

